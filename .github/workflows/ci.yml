name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix flake check

  build-linux:
    name: Build ${{ matrix.package }} (x86_64-linux)
    runs-on: ubuntu-latest
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        package:
          - caddy-with-plugins
          - pmbootstrap-new
          - openclaw
          - postgresql_16_spock
          - postgresql_17_spock
          - postgresql_18_spock
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }}

  build-macos:
    name: Build ${{ matrix.package }} (x86_64-darwin)
    runs-on: macos-latest
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        package:
          - caddy-with-plugins
          - pmbootstrap-new
          - openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }}

  build-code-server:
    name: Build code-server-latest
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: flake-check
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build code-server-latest
        run: nix build .#code-server-latest
